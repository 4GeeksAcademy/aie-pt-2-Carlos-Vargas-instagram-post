<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Postcard</title>
</head>

<body style="margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 20px; padding-top: 30px; font-family: Arial, sans-serif; text-align: center;">
    <div id="played-games" style="border: black solid 2px; width: 300px; height: auto; padding: 15px; border-radius: 8px;">
        <div>Videojuego jugados</div>
        <div>
            <span id="counter"></span>
            <div>
                <button id="subtract">-</button>
                <button id="add">+</button>
            </div>
        </div>
    </div>

    <table style="border-collapse: collapse; width: 420px; border: 2px solid black;">
        <tr>
            <th style="border: 1px solid black; padding: 10px;">Videojuego</th>
            <th style="border: 1px solid black; padding: 10px;">Puntuación</th>
            <th style="border: 1px solid black; padding: 10px;">Plataforma</th>
        </tr>
        <tr>
            <td style="border: 1px solid black; padding: 10px;">-</td>
            <td style="border: 1px solid black; padding: 10px;">-</td>
            <td style="border: 1px solid black; padding: 10px;">-</td>
        </tr>
    </table>

    <form style="display: flex; flex-direction: column; align-items: center; gap: 10px; border: 2px solid black; padding: 15px; width: 280px; border-radius: 8px;">
        <input type="text" name="videojuego" placeholder="Videojuego" style="width: 100%; padding: 8px;" />
        <input type="number" name="puntuacion" placeholder="Puntuación" style="width: 100%; padding: 8px;" />
        <input type="text" name="plataforma" placeholder="Plataforma" style="width: 100%; padding: 8px;" />
        <button type="submit" style="padding: 8px 16px; cursor: pointer;">Enviar</button>
    </form>
    <script src="main.js"></script>
</body>

</html>
